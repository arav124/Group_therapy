<h2>Emotional Neglect</h2>

<p>Q1</p>
<select id="en1">
  <option value="1">1</option>
  <option value="2">2</option>
  <option value="3">3</option>
  <option value="4">4</option>
  <option value="5">5</option>
</select>

<h2>Interpersonal Anxiety</h2>

<p>Q1 Anxiety</p>
<select id="ia_an1">
  <option value="0">0</option>
  <option value="1">1</option>
  <option value="2">2</option>
  <option value="3">3</option>
</select>

<p>Q1 Avoidance</p>
<select id="ia_av1">
  <option value="0">0</option>
  <option value="1">1</option>
  <option value="2">2</option>
  <option value="3">3</option>
</select>

<h2>Psychological Capital</h2>

<p>Q1</p>
<select id="psy1">
  <option value="1">1</option>
  <option value="2">2</option>
  <option value="3">3</option>
  <option value="4">4</option>
  <option value="5">5</option>
</select>

<br><br>

<button onclick="submitForm()">Analyze My Responses</button>

<script src="">
    async function submitForm() {

    let en = [
        parseInt(document.getElementById("en1").value)
    ];

    let ia_an = [
        parseInt(document.getElementById("ia_an1").value)
    ];

    let ia_av = [
        parseInt(document.getElementById("ia_av1").value)
    ];

    let psy = [
        parseInt(document.getElementById("psy1").value)
    ];

    let response = await fetch("http://127.0.0.1:5000/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            en: en,
            ia_an: ia_an,
            ia_av: ia_av,
            psy: psy
        })
    });

    let data = await response.json();

    // Store result
    localStorage.setItem("result", JSON.stringify(data));

    window.location.href = "result.html";
}

</script>

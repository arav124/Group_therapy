<h1>Assessment Result</h1>

<p id="risk"></p>
<p id="therapy"></p>
<p id="therapist"></p>
<p id="group"></p>

<script>
let data = JSON.parse(localStorage.getItem("result"));

document.getElementById("risk").innerText = "Risk Level: " + data.risk;
document.getElementById("therapy").innerText = "Therapy: " + data.therapy;
document.getElementById("therapist").innerText = "Therapist: " + data.therapist;
document.getElementById("group").innerText = "Group: Group " + data.cluster;
</script>
